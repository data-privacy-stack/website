<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Privacy Stack</title>
    <style>
      :root {
        --bg-start: #eef6f5;
        --bg-end: #d8e9f3;
        --card-bg: #ffffff;
        --text-main: #12343b;
        --text-muted: #4a6368;
        --accent: #1f7a8c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Avenir Next", "Helvetica Neue", sans-serif;
        color: var(--text-main);
        background: linear-gradient(140deg, var(--bg-start), var(--bg-end));
      }

      .hero {
        width: min(680px, 92vw);
        background: var(--card-bg);
        border-radius: 16px;
        padding: 2.5rem 2rem;
        text-align: center;
        box-shadow: 0 20px 45px rgba(18, 52, 59, 0.12);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 3vw, 2.6rem);
        line-height: 1.15;
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--text-muted);
      }

      .tagline {
        margin-top: 1.15rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <h1>Welcome to Data Privacy Stack</h1>
      <p class="tagline">Stay tuned for more information.</p>
    </main>
  </body>
</html>
